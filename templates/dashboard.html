<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slack Uptime</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 1.5rem;
            position: relative;
        }

        h1 {
            margin-top: 0;
        }

        .script-uptime {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: #4a154b;
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.9rem;
            font-variant-numeric: tabular-nums;
        }

        .bar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        input[type="search"],
        input[type="date"] {
            padding: 0.5rem 0.75rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
        }

        input[type="search"] {
            flex: 1;
            min-width: 180px;
        }

        button {
            padding: 0.5rem 1rem;
            background: #4a154b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #611f69;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 0.6rem 0.8rem;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f8f8f8;
            font-weight: 600;
        }

        .time {
            font-variant-numeric: tabular-nums;
        }

        .error {
            color: #c00;
        }
    </style>
</head>

<body>
    <div class="script-uptime" id="uptimeCounter">Script uptime: {{ script_uptime_hrs }} hrs</div>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h1 style="margin: 0;">Slack Uptime</h1>
        <div id="liveClock"
            style="font-size: 1.2rem; font-weight: 700; color: #4a154b; background: #f8f8f8; padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid #ddd; font-variant-numeric: tabular-nums;">
        </div>
    </div>
    <form class="bar" id="searchForm" method="get">
        <input type="search" name="q" id="searchInput" value="{{ search }}" placeholder="Search by name or email...">
        <input type="date" name="d" id="dateInput" value="{{ date.isoformat() }}">
        <button type="submit">Update</button>
    </form>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <p>Uptime for <strong id="dateDisplay">{{ date.strftime('%B %d, %Y') }}</strong></p>

    <table>
        <thead>
            <tr>
                <th>Name / Email</th>
                <th>Total Online Time</th>
            </tr>
        </thead>
        <tbody id="userTableBody">
            {% for u in users %}
            <tr>
                <td>{{ u.name }}<br><small style="color:#666">{{ u.email }}</small></td>
                <td class="time">{{ u.formatted }}</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="2">No data for this date.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <script>
        const searchInput = document.getElementById('searchInput');
        const dateInput = document.getElementById('dateInput');
        const userTableBody = document.getElementById('userTableBody');
        const uptimeCounter = document.getElementById('uptimeCounter');
        const searchForm = document.getElementById('searchForm');

        function updateLiveClock() {
            const clockEl = document.getElementById('liveClock');
            if (clockEl) {
                clockEl.textContent = new Date().toLocaleTimeString('en-US', { timeZone: 'Asia/Kolkata', hour12: true, hour: 'numeric', minute: '2-digit', second: '2-digit' }) + ' IST';
            }
        }
        setInterval(updateLiveClock, 1000);
        updateLiveClock();

        let scriptStartTime = null;
        {% if script_start_time %}
        scriptStartTime = "{{ script_start_time }}";
        {% endif %}

        function updateUptimeCounter() {
            if (!scriptStartTime) return;
            const now = new Date();
            const start = new Date(scriptStartTime);
            const diffSeconds = Math.floor((now - start) / 1000);
            if (diffSeconds < 0) return;
            const hours = Math.floor(diffSeconds / 3600);
            const minutes = Math.floor((diffSeconds % 3600) / 60);
            const seconds = diffSeconds % 60;

            let timeStr = '';
            if (hours > 0) {
                timeStr = `${hours}h ${minutes}m ${seconds}s`;
            } else if (minutes > 0) {
                timeStr = `${minutes}m ${seconds}s`;
            } else {
                timeStr = `${seconds}s`;
            }
            uptimeCounter.textContent = `Script uptime: ${timeStr}`;
        }

        // Update uptime counter every second
        setInterval(updateUptimeCounter, 1000);
        updateUptimeCounter();

        async function fetchUptimeData() {
            const q = encodeURIComponent(searchInput.value || '');
            const d = encodeURIComponent(dateInput.value || '');
            try {
                const res = await fetch(`/api/uptime?q=${q}&d=${d}`);
                const data = await res.json();

                if (data.error) {
                    console.error('Server error:', data.error);
                    return;
                }

                if (data.script_start_time) {
                    scriptStartTime = data.script_start_time;
                }

                // If user hasn't explicitly set a date, ensure it auto-advances if a new day starts locally
                if (!dateInput.value || dateInput.dataset.autoUpdating === "true") {
                    const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Kolkata' });
                    if (dateInput.value !== todayStr) {
                        dateInput.value = todayStr;
                    }
                    dateInput.dataset.autoUpdating = "true";
                }

                if (data.date) {
                    // Avoid timezone shifts by parsing YYYY-MM-DD manually
                    const [y, m, d] = data.date.split('-').map(Number);
                    const accurateDate = new Date(Date.UTC(y, m - 1, d));
                    const options = { month: 'long', day: 'numeric', year: 'numeric', timeZone: 'UTC' };
                    document.getElementById('dateDisplay').textContent = accurateDate.toLocaleDateString('en-US', options);
                }

                userTableBody.innerHTML = '';
                if (data.users && data.users.length > 0) {
                    data.users.forEach(u => {
                        const tr = document.createElement('tr');
                        const tdName = document.createElement('td');
                        const nameText = document.createTextNode(u.name || '(no name)');
                        const br = document.createElement('br');
                        const small = document.createElement('small');
                        small.style.color = '#666';
                        small.textContent = u.email || '(no email)';
                        tdName.appendChild(nameText);
                        tdName.appendChild(br);
                        tdName.appendChild(small);
                        const tdTime = document.createElement('td');
                        tdTime.className = 'time';
                        tdTime.textContent = u.formatted;
                        tr.appendChild(tdName);
                        tr.appendChild(tdTime);
                        userTableBody.appendChild(tr);
                    });
                } else {
                    userTableBody.innerHTML = '<tr><td colspan="2">No data for this date.</td></tr>';
                }

            } catch (e) {
                console.error('Fetch error:', e);
            }
        }

        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            fetchUptimeData();
        });

        let debounceTimer;
        searchInput.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => fetchUptimeData(), 400);
        });

        dateInput.addEventListener('change', () => {
            // Unset auto-updating flag when user manually picks a date
            dateInput.dataset.autoUpdating = "false";
            fetchUptimeData();
        });

        // Initialize flag on load
        dateInput.dataset.autoUpdating = "true";

        // Auto-refresh data every 30 seconds
        setInterval(fetchUptimeData, 30000);
    </script>
</body>

</html>
