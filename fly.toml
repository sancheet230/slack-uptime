# Fly.io - run: fly launch && fly secrets set ... && fly deploy
# Single VM runs dashboard + poller together

app = "slack-uptime"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "60s"
    path = "/health"
    method = "get"
